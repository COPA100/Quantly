[tool.ruff]
line-length = 100
target-version = "py313"
src = ["app"]

[tool.ruff.lint]
# pycodestyle errors/warnings, pyflakes, bugbear, pyupgrade.
# Imports are managed by isort (below), so the "I" rule is intentionally omitted.
select = ["E", "F", "W", "B", "UP"]

[tool.black]
line-length = 100
target-version = ["py313"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app"]
